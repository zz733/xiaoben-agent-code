# Nginx reverse proxy configuration for Paseo Relay Server
# Place this file in: /etc/nginx/sites-available/paseo-relay
# Then: ln -s /etc/nginx/sites-available/paseo-relay /etc/nginx/sites-enabled/

upstream paseo_relay {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name relay.17ai.pro;  # Your relay domain

    # Let's Encrypt validation path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect HTTP to HTTPS except for ACME challenge
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name relay.17ai.pro;  # Your relay domain

    # SSL certificate (use Let's Encrypt or your own cert)
    ssl_certificate /etc/letsencrypt/live/relay.17ai.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.17ai.pro/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # WebSocket proxy settings
    location / {
        proxy_pass http://paseo_relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout settings
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering for WebSocket
        proxy_buffering off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://paseo_relay;
        proxy_set_header Host $host;
        access_log off;
    }

    # Logging
    access_log /var/log/nginx/paseo-relay-access.log;
    error_log /var/log/nginx/paseo-relay-error.log;
}
