npmRebuild: false
appId: sh.paseo.desktop
productName: Paseo
executableName: Paseo
afterPack: ./scripts/after-pack.js
directories:
  output: release-win
files:
  - dist/**/*
  - "!**/*.map"
  - "!node_modules/@getpaseo/*/src/**"
  - "!node_modules/@getpaseo/**/*.test.*"
  - "!node_modules/@getpaseo/**/*.spec.*"
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
  - node_modules/@getpaseo/server/dist/server/terminal/shell-integration/**/*
extraResources:
  - from: ../app/dist
    to: app-dist
  - from: ../../skills
    to: skills
win:
  artifactName: "Paseo-Setup-${version}-${arch}.${ext}"
  icon: assets/icon.ico
  extraResources:
    - from: bin/paseo.cmd
      to: bin/paseo.cmd
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true