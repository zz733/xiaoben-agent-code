pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{css,js,json,jsonc,jsx,md,ts,tsx,yaml,yml}"
      exclude:
        - "**/package-lock.json"
      run: npm run format:check:files -- {staged_files}
    - name: lint
      glob: "*.{js,jsx,ts,tsx}"
      run: npm run lint -- {staged_files}
    - name: typecheck
      run: npm run typecheck
