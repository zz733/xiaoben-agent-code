<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paseo - 鸿蒙 WebView</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    .info-box {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
    .info-box h3 {
      margin-bottom: 10px;
    }
    .code {
      font-family: monospace;
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Paseo</h1>
    <p>鸿蒙 WebView 壳 - 占位页面</p>
    
    <div class="info-box">
      <h3>📝 使用说明</h3>
      <p>这是一个占位页面，实际使用前请运行资源复制脚本：</p>
      <div class="code">
        cd /path/to/xiaoben-agent-code<br>
        ./harmony/copy-web-assets.sh
      </div>
    </div>
    
    <div class="info-box" style="margin-top: 20px;">
      <h3>🔗 混合方案</h3>
      <p>当前：占位页面 → 如加载失败则自动回退到 https://paseo.app</p>
    </div>
  </div>
</body>
</html>
